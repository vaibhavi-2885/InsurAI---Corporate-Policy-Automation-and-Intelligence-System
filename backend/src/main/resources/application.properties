
server.port=8080
spring.application.name=insurai-backend
spring.config.import=optional:file:./local.properties

spring.datasource.url=${INSURAI_DB_URL:jdbc:mysql://localhost:3306/insurai_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${INSURAI_DB_USERNAME:root}
spring.datasource.password=${INSURAI_DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.h2.console.enabled=false

# Optional email configuration
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_STARTTLS:false}

# Optional external AI key
gemini.api.key=${GEMINI_API_KEY:}
